<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Instant Relief</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="container">

    <button id="themeToggle">🌙 Toggle Theme</button>

    <h1>Instant Relief</h1>

    <p class="subtitle">
      Tell me what’s stressing you — I’ll give you a simple action
    </p>

    <!-- SUGGESTIONS -->
    <div id="suggestions" class="suggestions"></div>

    <!-- INPUT -->
    <textarea
      id="input"
      placeholder="Example: I have a history exam tomorrow but I keep procrastinating..."
    ></textarea>

    <button id="btn">Get Action Plan</button>

    <!-- OUTPUT -->
    <div class="output">

      <div class="card do">
        <h3>DO</h3>
        <p id="do">-</p>
      </div>

      <div class="card dont">
        <h3>DON'T</h3>
        <p id="dont">-</p>
      </div>

      <div class="card action">
        <h3>⚡ ACTION</h3>
        <p id="action">Your action will appear here</p>
      </div>

    </div>

    <!-- FOLLOW-UP -->
    <div class="followup-box">
      <button id="smallerStepBtn">Smaller Step</button>
      <button id="stuckBtn">Still Stuck</button>
    </div>

    <div class="card followup-card">
      <h3>FOLLOW-UP</h3>
      <p id="followupText">-</p>
    </div>

    <!-- HISTORY -->
    <div class="history-box">
      <h3>🕘 Previous Sessions</h3>
      <div id="history"></div>
    </div>

    <!-- FEEDBACK -->
    <div class="feedback-box">

      <h3>💬 Send Feedback</h3>

      <p class="feedback-subtitle">
        Tell me what helped or what felt confusing
      </p>

      <textarea
        id="feedbackInput"
        placeholder="Write feedback..."
      ></textarea>

      <button id="sendFeedbackBtn">Send Feedback</button>

      <p id="feedbackStatus"></p>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <script>
    emailjs.init("Jk87AbK71SSYywniw");
  </script>

  <script src="script.js"></script>

</body>
</html>
